services:
  pdf-processor:
    image: stirlingtools/stirling-pdf:latest
    container_name: pdf-processor
    profiles: ["manual"]
    environment:
      - DOCKER_ENABLE_SECURITY=false
      - SECURITY_ENABLE_LOGIN=false
      - INSTALL_EXTRA_PACKAGES=tesseract-ocr-tur tesseract-ocr-eng
    volumes:
      - stirling_pdf_configs:/configs
      - stirling_pdf_train_data:/usr/share/tessdata
    networks:
      - nginx_net

volumes:
  stirling_pdf_configs:
    name: stirling_pdf_configs
  stirling_pdf_train_data:
    name: stirling_pdf_train_data
